#
# nodogsplash.conf — Hotspot Captive Portal for Newifi3-D2
# Installed at /etc/nodogsplash/nodogsplash.conf
#
# Landing page served dynamically from:
#   http://192.168.10.1/cgi-bin/splash.cgi
# Configurable via LuCI: Services → Hotspot Landing
#

# ── Gateway Interface ──
GatewayInterface br-lan
GatewayName         FreeWiFi
GatewayAddress      192.168.10.1
MaxClients          100

# ── Authentication ──
AuthenticateImmediately yes

# ── Splash Page ──
# Dynamic CGI that reads settings from /etc/config/hotspot-landing
RedirectURL          http://192.168.10.1/cgi-bin/splash.cgi

# ── Session Timeout ──
ClientIdleTimeout    600
ClientForceTimeout   3600

# ── Firewall Rules ──
FirewallRule allow tcp port 80
FirewallRule allow tcp port 443
FirewallRule allow tcp port 53
FirewallRule allow udp port 53
FirewallRule allow tcp port 5222
FirewallRule allow tcp port 5223
FirewallRule allow tcp port 5228

# ── Trusted MACs ──
TrustedMACList
